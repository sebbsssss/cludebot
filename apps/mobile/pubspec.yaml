name: clude_mobile
description: "Clude mobile app — AI memory companion"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  flutter_markdown: ^0.7.0
  url_launcher: ^6.2.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  shimmer: ^3.0.0
  connectivity_plus: ^6.0.0
  intl: ^0.19.0
  pinenacl: ^0.6.0
  qr_flutter: ^4.1.0
  file_picker: ^8.0.0
  privy_flutter: ^0.6.0
  app_links: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/clude-logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/clude-logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/clude-logo.png
    - assets/clude-logo-white.png
